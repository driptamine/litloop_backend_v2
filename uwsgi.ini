[uwsgi]
# NOTE: uwsgi (WSGI) CANNOT handle WebSocket connections.
# For real-time chat, run with daphne (ASGI) instead:
#
#   daphne -p 8000 litloop_project.asgi:application
#
# Or with auto-reload for development:
#
#   daphne -p 8000 --ws-protocol graphql_ws --ping-interval 20 --ping-timeout 30 litloop_project.asgi:application

# OLD WSGI config (does not support WebSockets):
# module = litloop_project.wsgi:application
# master = true
# processes = 2
# threads = 2
# http = 127.0.0.1:8000
# py-autoreload = 1
# vacuum = true
