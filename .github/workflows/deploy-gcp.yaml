name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Save SSH private key
      run: |
        echo "${{ secrets.SSH_PRIVATE_KEY_GCP }}" > key.pem
        chmod 600 key.pem

    - name: Create and Upload .env file
      run: |
        cat <<'EOF' > .env
        ${{ secrets.ENV_FILE }}
        EOF
        
        scp -i key.pem -o StrictHostKeyChecking=no .env ${{ secrets.GCP_USER }}@${{ secrets.GCE_PUBLIC_IP }}:~/litloop_backend_v2/.env

    - name: Sync files and run deploy script
      run: |
        # Ensure directory exists
        ssh -i key.pem -o StrictHostKeyChecking=no ${{ secrets.GCP_USER }}@${{ secrets.GCE_PUBLIC_IP }} "mkdir -p ~/litloop_backend_v2"
        
        # Sync code
        rsync -avz -e "ssh -i key.pem -o StrictHostKeyChecking=no" \
          --exclude '.git' \
          --exclude 'env' \
          --exclude 'venv' \
          --exclude 'venv_3.9' \
          --exclude '__pycache__' \
          --exclude 'uploaded_media' \
          --exclude 'static' \
          ./ ${{ secrets.GCP_USER }}@${{ secrets.GCE_PUBLIC_IP }}:~/litloop_backend_v2/

        # Execute remote script using EOF
        ssh -i key.pem -o StrictHostKeyChecking=no ${{ secrets.GCP_USER }}@${{ secrets.GCE_PUBLIC_IP }} << 'EOF'
          cd ~/litloop_backend_v2
          bash deploy/deploy_script.sh
        EOF

    - name: Clean up local secrets
      run: rm -f .env key.pem
