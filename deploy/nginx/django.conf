
# Standard Nginx WebSocket mapping
# This must be outside the server block
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name litloop.duckdns.org localhost;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name litloop.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/litloop.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/litloop.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://unix:/home/driptamine/litloop_backend_v2/deploy/gunicorn/gunicorn.sock;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_read_timeout 86400;
        client_max_body_size 100M;
    }

    # Explicit WebSocket handling for /ws/ paths
    location /ws/ {
        proxy_pass http://unix:/home/driptamine/litloop_backend_v2/deploy/gunicorn/gunicorn.sock;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket specific hardening
        proxy_buffering off;
        proxy_redirect off;
        proxy_connect_timeout 75s;
        proxy_send_timeout 86400;
        proxy_read_timeout 86400;
    }

    # Static and Media files
    location /static/ {
        alias /home/driptamine/litloop_backend_v2/static/;
    }

    location /uploaded_media/ {
        alias /home/driptamine/litloop_backend_v2/uploaded_media/;
    }
}
