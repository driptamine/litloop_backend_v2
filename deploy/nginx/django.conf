
# Standard Nginx WebSocket mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name litloop.duckdns.org localhost;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name litloop.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/litloop.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/litloop.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /ws/ {
        # Proxy to Daphne on port 8000 for WebSockets
        proxy_pass http://127.0.0.1:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        proxy_read_timeout 86400;
        proxy_connect_timeout 75s;
        proxy_send_timeout 86400;
    }

    location / {
        # Proxy standard HTTP traffic to Gunicorn on port 8001
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        proxy_read_timeout 300;
        client_max_body_size 100M;
    }

    # Static and Media files
    location /static/ {
        alias /home/driptamine/litloop_backend_v2/static/;
    }

    location /uploaded_media/ {
        alias /home/driptamine/litloop_backend_v2/uploaded_media/;
    }
}
