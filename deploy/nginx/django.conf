
# Basic HTTP configuration for LitLoop
server {
    listen 80;
    server_name litloop.duckdns.org localhost;

    location / {
        proxy_pass http://unix:/home/ubuntu/litloop_backend_v2/deploy/gunicorn/gunicorn.sock;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 100M;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static and Media files
    location /static/ {
        alias /home/ubuntu/litloop_backend_v2/static/;
    }

    location /uploaded_media/ {
        alias /home/ubuntu/litloop_backend_v2/uploaded_media/;
    }
}
