
# Serve HTTPS with SSL cert
server {
    listen 80;
    server_name litloop.duckdns.org;


    location / {
        proxy_pass http://unix:/home/ubuntu/litloop_backend_v2/deploy/gunicorn/gunicorn.sock;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 100M;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl;
    server_name litloop.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/litloop.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/litloop.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;


    location / {
        # proxy_pass http://127.0.0.1:8000/;
        proxy_pass http://unix:/home/ubuntu/litloop_backend_v2/deploy/gunicorn/gunicorn.sock;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional for file uploads:
        client_max_body_size 100M;

        # Optional for WebSockets:
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
