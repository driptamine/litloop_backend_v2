
# LitLoop Nginx Configuration
server {
    listen 80;
    server_name litloop.duckdns.org localhost;

    # Redirect all HTTP traffic to HTTPS (Optional: Uncomment AFTER running Certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://unix:/home/driptamine/litloop_backend_v2/deploy/gunicorn/gunicorn.sock;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard proxy settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        client_max_body_size 100M;
    }

    # Explicit WebSocket handling
    location /ws/ {
        proxy_pass http://unix:/home/driptamine/litloop_backend_v2/deploy/gunicorn/gunicorn.sock;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 86400; # Keep connections alive for 24h
    }

    # Static and Media files
    location /static/ {
        alias /home/driptamine/litloop_backend_v2/static/;
    }

    location /uploaded_media/ {
        alias /home/driptamine/litloop_backend_v2/uploaded_media/;
    }
}
