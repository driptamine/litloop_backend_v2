# Local Development Nginx Configuration for LitLoop
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    # Increase upload limit for local testing
    client_max_body_size 100M;

    # Static files
    location /static/ {
        alias /Users/driptamine/Desktop/litloop_backend/static/;
    }

    # Media files
    location /uploaded_media/ {
        alias /Users/driptamine/Desktop/litloop_backend/uploaded_media/;
    }

    # Proxy everything else to Django/Daphne
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Long timeouts for debugging
        proxy_read_timeout 86400;
    }
}
